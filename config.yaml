# Mihomo (Clash) Configuration
# Конфигурация предназначена для использования в качестве прозрачного прокси
# на маршрутизаторе Keenetic. DNS-запросы обрабатываются роутером.

# --------------------------------------------------------------------
# --- ОБЩИЕ НАСТРОЙКИ СИСТЕМЫ И ИНТЕРФЕЙСА (CORE & UI SETTINGS) ---
# --------------------------------------------------------------------
port: 7890 # HTTP прокси-порт для локальных устройств (ПК, телефоны)
socks-port: 7891 # SOCKS5 прокси-порт для локальных устройств
allow-lan: true # Разрешить подключение с других устройств в локальной сети
unified-delay: true
mode: rule # Режим маршрутизации: работает по правилам (Rule-based)
geo-auto-update: true
geo-update-interval: 168
geodata-mode: true
keep-alive-interval: 30
log-level: silent # Уровень логирования (info - рекомендуемый)
ipv6: true # Включить поддержку IPv6 для современного трафика
# --- ПОРТЫ ДЛЯ ПРОЗРАЧНОГО ПРОКСИ (TPROXY/REDIRECTIONS ДЛЯ ROUTERA) ---
redir-port: 7892 # Порт для перенаправления TCP/HTTP трафика (используется Keenetic)
tproxy-port: 7893 # Порт для TPROXY/UDP (используется Keenetic для UDP-трафика)

# --- НАСТРОЙКИ WEB-ИНТЕРФЕЙСА И ПРОФИЛЯ ---
external-controller: '0.0.0.0:9090' # Порт для доступа к Web-интерфейсу (Dashboard)
secret: 'admin' # TODO: Сменить пароль! Задайте сложный пароль вручную (не 'admin').
external-ui: ui # Название папки с Web-интерфейсом
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip' # URL для автоматической загрузки интерфейса
profile:
  store-selected: true # Сохранять выбранный пользователем прокси для групп Select

# --- СНИФФЕР (SNIFFER) ---
sniffer:
  enable: true # Включить функцию сниффера для определения типа трафика
  parse-pure-ip: true # Анализировать трафик к чистым IP-адресам
  force-dns-mapping: true # Принудительно отображать DNS-запросы
  sniff:
    HTTP: # HTTP-трафик
    TLS: # HTTPS/SSL-трафик
    QUIC: # QUIC-трафик

# --------------------------------------------------------------------
# --- Секция 1: ПРОВАЙДЕРЫ ПРОКСИ (PROXY PROVIDERS) ---
# Определяет внешние подписки или источники прокси-серверов.
# --------------------------------------------------------------------
proxy-providers:
  subscription:
    type: http
    url: https://prev.mewal.nl/KRKygPMyu6-cYWg_
    path: ./proxy-providers/subscription.yaml
    interval: 3600 # Обновление каждые 60 минут
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
      timeout: 10000
      lazy: true
      expected-status: 204
    override:
      tfo: true
      mptcp: true
      udp: true

# geosite/geoip базы (нужны для GEOSITE/* правил ниже)
geox-url:
  geosite: 'https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat'
  geoip: 'https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geoip.dat'

proxies: [] # ноды подтянутся из subscription

# ==== ГРУППЫ (нижний профиль + переключаемые сервисные) ====
