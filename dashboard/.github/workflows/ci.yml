name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - run: go build -ldflags "-s -w" ./cmd/xmeow-ui/
        env:
          CGO_ENABLED: "0"
