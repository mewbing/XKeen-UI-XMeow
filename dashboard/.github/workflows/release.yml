name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            suffix: linux_arm64
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            suffix: linux_mipsle
          - goos: linux
            goarch: mips
            gomips: softfloat
            suffix: linux_mips
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux_armv7
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" -o xmeow-ui ./cmd/xmeow-ui/
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          GOARM: ${{ matrix.goarm }}

      - name: Compress with UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: xmeow-ui
          args: --best --lzma

      - name: Package
        run: tar -czf xmeow-ui_${{ steps.version.outputs.version }}_${{ matrix.suffix }}.tar.gz xmeow-ui README.md

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: "*.tar.gz"

  release:
    needs: [build-frontend, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Package dist
        run: tar -czf dist.tar.gz -C dist/ .

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "XMeow UI ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            *.tar.gz
            checksums.txt
